---
name: E2E EC2 Ephemeral Runner

# workflow_dispatch only, deliberately -- this is an interim risk gate.
# ec2-runner-orphan-watchdog.yml now exists (backstop for cancelled/hung
# runs that break the teardown chain), which was the specific prerequisite
# for this gate -- but no pull_request/schedule trigger has been added here
# yet regardless, so exposure stays limited to manually-triggered runs
# someone is actively watching. Revisit as a separate, deliberate change.
#
# AMI id, subnet id, and security group id are NOT dispatch inputs: this
# repo is public, and workflow_dispatch inputs are visible forever in the
# Actions run history/API to anyone. The reusable workflow fetches them from
# Vault instead (see .github/actions/fetch-ec2-runner-network-config).
on:
  workflow_dispatch:
    inputs:
      instance-type:
        description: "EC2 instance type -- curated allow-list, not free text, so a dispatch (available to anyone with write access) can't accidentally launch an unexpectedly expensive type. Add to `options` deliberately."
        required: false
        type: choice
        options:
          - "c5n.metal"
        default: "c5n.metal"
      aws-region:
        description: "AWS region to launch into"
        required: false
        default: "us-east-1"
      tooling-check-cmds:
        description: "Semicolon-separated commands to verify on the box before JIT registration. Default is a placeholder pending CaaS/Netris team sync -- override here to smoke-test against a stock AMI (e.g. 'true') or to check for whatever the real test suite needs, without editing the workflow file."
        required: false
        default: "command -v podman"
      osac-installer-image:
        description: "Override osac-installer image (registry-pullable reference) -- empty means no override. Not sensitive: just a container image tag."
        required: false
        default: ""
      osac-operator-image:
        description: "Override osac-operator image (registry-pullable reference) -- empty means no override"
        required: false
        default: ""
      fulfillment-service-image:
        description: "Override fulfillment-service image (registry-pullable reference) -- empty means no override"
        required: false
        default: ""
      osac-aap-ee-image:
        description: "Override osac-aap execution-environment image (registry-pullable reference) -- empty means no override"
        required: false
        default: ""

jobs:
  e2e-ec2-runner:
    uses: ./.github/workflows/e2e-ec2-runner.yml
    with:
      instance-type: ${{ inputs.instance-type || 'c5n.metal' }}
      aws-region: ${{ inputs.aws-region || 'us-east-1' }}
      tooling-check-cmds: ${{ inputs.tooling-check-cmds || 'command -v podman' }}
      osac-installer-image: ${{ inputs.osac-installer-image || '' }}
      osac-operator-image: ${{ inputs.osac-operator-image || '' }}
      fulfillment-service-image: ${{ inputs.fulfillment-service-image || '' }}
      osac-aap-ee-image: ${{ inputs.osac-aap-ee-image || '' }}
