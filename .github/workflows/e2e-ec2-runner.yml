---
name: E2E EC2 Ephemeral Runner

on:
  workflow_call:
    inputs:
      instance-type:
        description: "EC2 instance type"
        required: false
        type: string
        default: "c5n.metal"
      aws-region:
        description: "AWS region to launch into"
        required: false
        type: string
        default: "us-east-1"
      orchestrator-runner-label:
        description: "Self-hosted runner label for the orchestrator (dedicated, not the shared osac-ci fleet, so it's never queued behind existing e2e jobs)"
        required: false
        type: string
        default: "osac-ci-orchestrator"
      tooling-check-cmds:
        description: "Semicolon-separated commands to verify on the box before JIT registration (placeholder pending CaaS/Netris team sync)"
        required: false
        type: string
        default: "command -v podman"
      osac-installer-image:
        description: "Override osac-installer image (registry-pullable reference, e.g. from a component repo's own PR build) -- empty means no override, use infra/netris's own default"
        required: false
        type: string
        default: ""
      osac-operator-image:
        description: "Override osac-operator image (registry-pullable reference) -- empty means no override"
        required: false
        type: string
        default: ""
      fulfillment-service-image:
        description: "Override fulfillment-service image (registry-pullable reference) -- empty means no override"
        required: false
        type: string
        default: ""
      osac-aap-ee-image:
        description: "Override osac-aap execution-environment image (registry-pullable reference) -- empty means no override"
        required: false
        type: string
        default: ""
    outputs:
      result:
        description: "Overall result: PASSED or FAILED"
        value: ${{ jobs.test.outputs.result }}

jobs:
  provision:
    runs-on: ${{ inputs.orchestrator-runner-label }}
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      # Run-specific, not the orchestrator's shared ~/.ssh/known_hosts --
      # see provision.sh's header for why (recycled EC2 IPs can carry a
      # stale cached host key in a shared file). Deterministically derived
      # here (rather than passed as a job output) so the teardown job,
      # which needs the identical path to clean it up, can compute the same
      # value independently.
      KNOWN_HOSTS_FILE: /tmp/osac-ec2-known-hosts-${{ github.run_id }}-${{ github.run_attempt }}
    outputs:
      instance-id: ${{ steps.provision.outputs.instance-id }}
      public-ip: ${{ steps.provision.outputs.public-ip }}
      ssh-user: ${{ steps.provision.outputs.ssh-user }}
      runner-label: ${{ steps.register.outputs.runner-label }}
      runner-id: ${{ steps.register.outputs.runner-id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Validate and bootstrap
        id: setup
        uses: ./.github/actions/validate-and-bootstrap
        with:
          test-suite: ec2-runner
          run-id: ${{ github.run_id }}

      - name: Fetch EC2 runner AWS credentials
        id: aws-creds
        uses: ./.github/actions/fetch-ec2-runner-aws-creds
        with:
          role-id: ${{ steps.setup.outputs.role-id }}
          secret-id: ${{ steps.setup.outputs.secret-id }}

      - name: Fetch EC2 runner GitHub PAT
        id: gh-pat
        uses: ./.github/actions/fetch-ec2-runner-github-pat
        with:
          role-id: ${{ steps.setup.outputs.role-id }}
          secret-id: ${{ steps.setup.outputs.secret-id }}

      - name: Fetch EC2 runner network config
        id: network-config
        uses: ./.github/actions/fetch-ec2-runner-network-config
        with:
          role-id: ${{ steps.setup.outputs.role-id }}
          secret-id: ${{ steps.setup.outputs.secret-id }}

      - name: Verify orchestrator SSH keypair exists
        shell: bash
        run: |
          if [ ! -f "${HOME}/.ssh/osac_ec2_orchestrator" ] || [ ! -f "${HOME}/.ssh/osac_ec2_orchestrator.pub" ]; then
            echo "::error::Orchestrator SSH keypair not found at ~/.ssh/osac_ec2_orchestrator{,.pub}."
            echo "This is a static, non-rotating keypair generated once during orchestrator"
            echo "runner setup (see docs/new-ci-machine-setup.md), not per-run -- it must"
            echo "already exist on this machine."
            exit 1
          fi

      - name: Provision ephemeral EC2 instance
        id: provision
        shell: bash
        env:
          AMI_ID: ${{ steps.network-config.outputs.AMI_ID }}
          INSTANCE_TYPE: ${{ inputs.instance-type }}
          SUBNET_ID: ${{ steps.network-config.outputs.SUBNET_ID }}
          SECURITY_GROUP_ID: ${{ steps.network-config.outputs.SECURITY_GROUP_ID }}
          # run_attempt (not just run_id) so a re-run after a failed teardown
          # never collides with a still-registered runner/instance from the
          # previous attempt.
          RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
          AWS_ACCESS_KEY_ID: ${{ steps.aws-creds.outputs.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.aws-creds.outputs.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ inputs.aws-region }}
        run: |
          export ORCHESTRATOR_PUBKEY_PATH="${HOME}/.ssh/osac_ec2_orchestrator.pub"
          export SSH_KEY_PATH="${HOME}/.ssh/osac_ec2_orchestrator"
          ./scripts/ec2-runner/provision.sh

      - name: Verify tooling and register JIT runner
        id: register
        shell: bash
        env:
          SSH_USER: ${{ steps.provision.outputs.ssh-user }}
          PUBLIC_IP: ${{ steps.provision.outputs.public-ip }}
          RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
          GH_TOKEN: ${{ steps.gh-pat.outputs.GH_TOKEN }}
          TOOLING_CHECK_CMDS: ${{ inputs.tooling-check-cmds }}
        run: |
          export SSH_KEY_PATH="${HOME}/.ssh/osac_ec2_orchestrator"
          ./scripts/ec2-runner/verify-and-register.sh

      - name: Install and start runner
        shell: bash
        env:
          SSH_USER: ${{ steps.provision.outputs.ssh-user }}
          PUBLIC_IP: ${{ steps.provision.outputs.public-ip }}
          JIT_CONFIG: ${{ steps.register.outputs.jit-config }}
        run: |
          export SSH_KEY_PATH="${HOME}/.ssh/osac_ec2_orchestrator"
          ./scripts/ec2-runner/start-runner.sh

  test:
    needs: provision
    runs-on: ${{ needs.provision.outputs.runner-label }}
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      result: ${{ steps.placeholder.outcome == 'success' && 'PASSED' || 'FAILED' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      # Unlike Prow's netris-caas job (which always gets fresh, ci-operator
      # -resolved image references for all four of these via its
      # `dependencies:` mechanism), these are optional overrides here --
      # there's no equivalent automatic build/resolution graph in GitHub
      # Actions, so a component repo's own CI is responsible for having
      # already built and pushed an image before passing its reference in.
      # Empty means "no override", not "override with an empty value" --
      # only non-empty inputs are included, letting infra/netris's own
      # Makefile/ansible defaults apply otherwise.
      - name: Build component image overrides
        id: extra-vars
        shell: bash
        env:
          OSAC_INSTALLER_IMAGE: ${{ inputs.osac-installer-image }}
          OSAC_OPERATOR_IMAGE: ${{ inputs.osac-operator-image }}
          FULFILLMENT_SERVICE_IMAGE: ${{ inputs.fulfillment-service-image }}
          OSAC_AAP_EE_IMAGE: ${{ inputs.osac-aap-ee-image }}
        run: |
          EXTRA_VARS="{}"
          declare -A OVERRIDES=(
            [osac_installer_image]="$OSAC_INSTALLER_IMAGE"
            [osac_operator_image]="$OSAC_OPERATOR_IMAGE"
            [fulfillment_service_image]="$FULFILLMENT_SERVICE_IMAGE"
            [osac_aap_image]="$OSAC_AAP_EE_IMAGE"
          )
          for key in "${!OVERRIDES[@]}"; do
            value="${OVERRIDES[$key]}"
            if [ -n "$value" ]; then
              EXTRA_VARS=$(echo "$EXTRA_VARS" | jq -c --arg k "$key" --arg v "$value" '. + {($k): $v}')
              echo "Component image override: ${key}=${value}"
            fi
          done
          echo "json=${EXTRA_VARS}" >> "$GITHUB_OUTPUT"

      - name: Placeholder test step
        id: placeholder
        shell: bash
        env:
          EXTRA_VARS_JSON: ${{ steps.extra-vars.outputs.json }}
        run: |
          echo "TODO: CaaS/Netris test logic runs here (owned by another team)."
          echo "This skeleton only proves provisioning, tooling install, and log collection."
          echo "Component image overrides that would be passed to make deploy-ocp-snapshot: ${EXTRA_VARS_JSON}"

      - name: Gather EC2 runner artifacts
        if: always()
        uses: ./.github/actions/gather-ec2-runner-artifacts

  teardown:
    needs: [provision, test]
    if: always()
    runs-on: ${{ inputs.orchestrator-runner-label }}
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      # Must match the provision job's derivation exactly -- see that job's
      # env block for why this is computed independently rather than passed
      # as an output.
      KNOWN_HOSTS_FILE: /tmp/osac-ec2-known-hosts-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      # Every step below is if: always(): the job-level if: always() only
      # guarantees this job STARTS regardless of provision/test outcome, it
      # does not make a later step run if an earlier step in this job fails.
      # Without this, a transient Vault hiccup while fetching credentials
      # here would skip the "Teardown" step itself, leaving a real, billed
      # instance running with no automated path to terminate it.
      - name: Checkout repository
        if: always()
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Validate and bootstrap
        if: always()
        id: setup
        uses: ./.github/actions/validate-and-bootstrap
        with:
          test-suite: ec2-runner
          run-id: ${{ github.run_id }}

      - name: Fetch EC2 runner AWS credentials
        if: always()
        id: aws-creds
        uses: ./.github/actions/fetch-ec2-runner-aws-creds
        with:
          role-id: ${{ steps.setup.outputs.role-id }}
          secret-id: ${{ steps.setup.outputs.secret-id }}

      - name: Fetch EC2 runner GitHub PAT
        if: always()
        id: gh-pat
        uses: ./.github/actions/fetch-ec2-runner-github-pat
        with:
          role-id: ${{ steps.setup.outputs.role-id }}
          secret-id: ${{ steps.setup.outputs.secret-id }}

      - name: Teardown
        if: always()
        shell: bash
        env:
          INSTANCE_ID: ${{ needs.provision.outputs.instance-id }}
          RUNNER_ID: ${{ needs.provision.outputs.runner-id }}
          GH_TOKEN: ${{ steps.gh-pat.outputs.GH_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ steps.aws-creds.outputs.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.aws-creds.outputs.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ inputs.aws-region }}
        run: ./scripts/ec2-runner/teardown.sh
