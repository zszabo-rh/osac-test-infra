---
name: E2E VMaaS Full Install

on:
  workflow_call:
    inputs:
      test-suite:
        description: "Test suite to run: vmaas, caas, or empty string for all"
        required: false
        type: string
        default: "vmaas"
      test-filter:
        description: "pytest -k filter expression (optional)"
        required: false
        type: string
        default: ""
      namespace:
        description: "OSAC namespace on the cluster"
        required: false
        type: string
        default: "osac-e2e-ci"
      vm-template:
        description: "VM template for compute instances"
        required: false
        type: string
        default: "osac.templates.ocp_virt_vm"
      cluster-template:
        description: "Cluster template for CaaS tests"
        required: false
        type: string
        default: ""
      flavor-image:
        description: "OCI image containing the cluster-tool flavor"
        required: false
        type: string
        default: "quay.io/rh-ee-ovishlit/cluster-snapshots:sno-4-19-ps"
      flavor-name:
        description: "cluster-tool flavor name"
        required: false
        type: string
        default: "sno-4-19-ps"
      image-overrides:
        description: "JSON object mapping Helm value paths to image refs, e.g. '{\"service.images.service\":\"ghcr.io/osac-project/fulfillment-service:pr-123\"}'"
        required: false
        type: string
        default: "{}"
      installer-ref:
        description: "Branch/ref of osac-installer to clone for the deploy step"
        required: false
        type: string
        default: "main"
      installer-repo:
        description: "GitHub repo (owner/name) to clone osac-installer from"
        required: false
        type: string
        default: "osac-project/osac-installer"
      test-infra-repository:
        description: "Repository to checkout for tests/Containerfile (for cross-repo calls)"
        required: false
        type: string
        default: ""
      test-infra-ref:
        description: "Git ref of test infrastructure repository"
        required: false
        type: string
        default: ""
      component-repo:
        description: "GitHub repo (owner/name) of a component to build from source. Requires component-ref and component-image-key."
        required: false
        type: string
        default: ""
      component-ref:
        description: "Branch or tag name of the component repository to build (must be a named ref, not a SHA)"
        required: false
        type: string
        default: ""
      component-image-key:
        description: "Helm value path for the component image (e.g. service.images.service)"
        required: false
        type: string
        default: ""
      component-containerfile:
        description: "Path to Containerfile (or execution-environment.yaml for ansible-builder) relative to component repo root"
        required: false
        type: string
        default: "Containerfile"
      component-build-type:
        description: "Build method: 'containerfile' (default) or 'ansible-builder'"
        required: false
        type: string
        default: "containerfile"
    outputs:
      result:
        description: "Test result: PASSED or FAILED"
        value: ${{ jobs.e2e.outputs.result }}

jobs:
  e2e:
    runs-on: osac-ci
    environment: e2e-test
    permissions:
      contents: read
    outputs:
      result: ${{ steps.test.outcome == 'success' && 'PASSED' || 'FAILED' }}

    env:
      FLAVOR_LOCK: "/tmp/cluster-tool-flavor-${{ inputs.flavor-name }}.lock"

    steps:
      - name: Validate fork PR author
        if: github.event.pull_request.head.repo.fork == true
        env:
          AUTHOR_ASSOCIATION: ${{ github.event.pull_request.author_association }}
        run: |
          case "${AUTHOR_ASSOCIATION}" in
            OWNER|MEMBER|COLLABORATOR|CONTRIBUTOR)
              echo "PR author association is ${AUTHOR_ASSOCIATION} — allowing fork e2e."
              ;;
            *)
              echo "::error::PR author association is '${AUTHOR_ASSOCIATION}'. Fork PRs require org membership."
              exit 1
              ;;
          esac

      - name: Set clone name
        id: clone-name
        env:
          SUITE: ${{ inputs.test-suite || 'e2e' }}
          RUN_ID: ${{ github.run_id }}
        run: |
          # Sanitize suite to lowercase alphanumeric/hyphens only
          SUITE=$(echo "${SUITE}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]//g')
          CLONE_NAME="${SUITE:0:1}${RUN_ID: -7}-${SUITE}"
          echo "CLONE_NAME=${CLONE_NAME}" >> "$GITHUB_ENV"
          echo "clone-name=${CLONE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ inputs.test-infra-repository || github.repository }}
          ref: ${{ inputs.test-infra-ref || '' }}
          persist-credentials: false

      - name: Validate component inputs
        if: inputs.component-repo != ''
        env:
          COMPONENT_REPO: ${{ inputs.component-repo }}
          COMPONENT_REF: ${{ inputs.component-ref }}
          COMPONENT_IMAGE_KEY: ${{ inputs.component-image-key }}
        run: |
          # --- Validate component inputs ---
          if [[ -z "${COMPONENT_REF}" ]] || [[ -z "${COMPONENT_IMAGE_KEY}" ]]; then
            echo "::error::component-repo requires component-ref and component-image-key"
            exit 1
          fi

          # Repo must be "org/name" format
          if [[ ! "${COMPONENT_REPO}" =~ ^[A-Za-z0-9._-]+/[A-Za-z0-9._-]+$ ]]; then
            echo "::error::component-repo '${COMPONENT_REPO}' is not a valid org/repo format"
            exit 1
          fi

      # --- Secret bootstrap (inline — must not run PR-controlled code) ---
      - name: Read AppRole credentials
        id: approle
        run: |
          APPROLE_DIR="${HOME}/.vault-server/.approle"
          echo "role-id=$(cat "${APPROLE_DIR}/role-id")" >> "$GITHUB_OUTPUT"
          echo "::add-mask::$(cat "${APPROLE_DIR}/secret-id")"
          echo "secret-id=$(cat "${APPROLE_DIR}/secret-id")" >> "$GITHUB_OUTPUT"

      - name: Retrieve secrets from Vault
        id: vault
        uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4
        with:
          url: http://127.0.0.1:8200
          method: approle
          roleId: ${{ steps.approle.outputs.role-id }}
          secretId: ${{ steps.approle.outputs.secret-id }}
          exportEnv: false
          secrets: |
            secret/data/osac/e2e/pull-secret dockerconfigjson | PULL_SECRET ;
            secret/data/osac/e2e/aap-license license | AAP_LICENSE ;
            secret/data/osac/e2e/snapshot-registry dockerconfigjson | SNAPSHOT_REGISTRY_AUTH

      - name: Write secrets
        env:
          PULL_SECRET: ${{ steps.vault.outputs.PULL_SECRET }}
          AAP_LICENSE: ${{ steps.vault.outputs.AAP_LICENSE }}
          SNAPSHOT_REGISTRY_AUTH: ${{ steps.vault.outputs.SNAPSHOT_REGISTRY_AUTH }}
        run: |
          mkdir -p "${HOME}/.config/containers"

          # Merge OCP pull-secret with snapshot registry auth into a single
          # auth file.  The snapshot secret uses a path-scoped key
          # (quay.io/rh-ee-ovishlit) so it won't conflict with the OCP
          # quay.io entry.
          jq -s '.[0].auths * .[1].auths | {auths: .}' \
            <(printf '%s' "${PULL_SECRET}") \
            <(printf '%s' "${SNAPSHOT_REGISTRY_AUTH}") \
            > "${HOME}/.config/containers/auth.json"
          chmod 600 "${HOME}/.config/containers/auth.json"

          # cluster-tool runs via sudo (root), so root's skopeo needs the
          # same auth file for pulling from private registries.
          sudo mkdir -p /root/.config/containers
          sudo cp "${HOME}/.config/containers/auth.json" /root/.config/containers/auth.json
          sudo chmod 600 /root/.config/containers/auth.json

          printf '%s' "${PULL_SECRET}" > "$RUNNER_TEMP/pull-secret.json"
          chmod 600 "$RUNNER_TEMP/pull-secret.json"

          printf '%s' "${AAP_LICENSE}" | base64 -d > "$RUNNER_TEMP/aap-license.zip"
          chmod 600 "$RUNNER_TEMP/aap-license.zip"

      - name: Prepare cluster environment
        env:
          FLAVOR_IMAGE: ${{ inputs.flavor-image }}
          FLAVOR_NAME: ${{ inputs.flavor-name }}
        run: |
          # --- Ensure cluster-tool is configured ---
          CT_CONFIG="${HOME}/.config/cluster-tool"
          ROOT_CONFIG="/root/.config/cluster-tool"
          if [[ -f "${CT_CONFIG}/servers.json" ]] && [[ -f "${CT_CONFIG}/state.json" ]]; then
            echo "cluster-tool already configured."
          elif [[ -f "${ROOT_CONFIG}/servers.json" ]]; then
            echo "Syncing cluster-tool config from root..."
            mkdir -p "${CT_CONFIG}"
            cp "${ROOT_CONFIG}"/{config,servers.json,state.json,cluster-tool.key,cluster-tool.key.pub} "${CT_CONFIG}/" 2>/dev/null || true
          else
            echo "ERROR: cluster-tool not configured. Run machine-init.sh first." >&2
            exit 1
          fi

          # --- Pull cluster flavor if missing or outdated ---
          # All digest checking and pulling runs inside an exclusive flock
          # so concurrent jobs serialize. After acquiring the lock we
          # re-check whether the pull is still needed (another job may
          # have completed it while we waited).
          #
          # Use fd-based locking so the lock is tied to this shell, not
          # to child processes.  The `9>&-` on every sudo call prevents
          # children from inheriting the fd — if this step is cancelled
          # and sudo is orphaned, the lock is still released when the
          # shell exits (fd 9 closes).
          DIGEST_FILE="/tmp/cluster-tool-flavor-${FLAVOR_NAME}.digest"
          REMOTE_DIGEST=$(skopeo inspect "docker://${FLAVOR_IMAGE}" --format '{{.Digest}}' 2>/dev/null || echo "")

          exec 9>"${FLAVOR_LOCK}"
          flock --exclusive 9
          echo "Acquired flavor lock."

          LOCAL_DIGEST=""
          if [[ -f "${DIGEST_FILE}" ]]; then
            LOCAL_DIGEST=$(cat "${DIGEST_FILE}")
          fi

          FLAVOR_EXISTS=false
          if sudo python3 /usr/local/bin/cluster-tool flavors 9>&- \
               | grep -q "^${FLAVOR_NAME} "; then
            FLAVOR_EXISTS=true
          fi

          NEED_PULL=false
          if ${FLAVOR_EXISTS}; then
            if [[ -n "${REMOTE_DIGEST}" ]] && [[ "${REMOTE_DIGEST}" == "${LOCAL_DIGEST}" ]]; then
              echo "Flavor '${FLAVOR_NAME}' is up to date (digest: ${LOCAL_DIGEST}) — skipping pull."
            elif [[ -n "${REMOTE_DIGEST}" ]]; then
              echo "Flavor '${FLAVOR_NAME}' exists but image changed (local: ${LOCAL_DIGEST:-none}, remote: ${REMOTE_DIGEST}) — deleting and re-pulling..."
              sudo python3 /usr/local/bin/cluster-tool flavors --delete "${FLAVOR_NAME}" 9>&- || true
              NEED_PULL=true
            else
              echo "Flavor '${FLAVOR_NAME}' already present, could not check remote digest — skipping pull."
            fi
          else
            echo "Flavor '${FLAVOR_NAME}' not found — pulling..."
            NEED_PULL=true
          fi

          if ${NEED_PULL}; then
            sudo python3 /usr/local/bin/cluster-tool pull "${FLAVOR_IMAGE}" 9>&-
            if [[ -n "${REMOTE_DIGEST}" ]]; then
              echo "${REMOTE_DIGEST}" > "${DIGEST_FILE}"
            fi
          fi

          exec 9>&-
          echo "Released flavor lock."

          # --- Clean up stale clone resources ---
          # Destroy any leftover clone from a previous run attempt, then
          # remove orphaned Linux bridges that survive virsh net-destroy
          # (e.g. from interrupted teardowns). Only targets bridges matching
          # this clone's truncated name — safe with concurrent jobs.
          sudo python3 /usr/local/bin/cluster-tool destroy "${CLONE_NAME}" 2>/dev/null || true
          BRIDGE_PREFIX="br-${CLONE_NAME:0:8}"
          for br in $(ip -o link show | grep -oP "${BRIDGE_PREFIX}[^ @]*"); do
            echo "Removing stale bridge ${br}..."
            sudo ip link set "${br}" down 2>/dev/null || true
            sudo ip link delete "${br}" 2>/dev/null || true
          done

      - name: Boot cluster clone
        env:
          FLAVOR_NAME: ${{ inputs.flavor-name }}
        run: |
          # Shared lock ensures no boot runs while a flavor pull is in progress.
          # Multiple boots can run in parallel (shared locks are compatible).
          # Use fd-based locking with `9>&-` on the child so an orphaned
          # sudo process doesn't keep the lock alive after cancellation.
          exec 9>"${FLAVOR_LOCK}"
          flock --shared 9
          sudo python3 /usr/local/bin/cluster-tool boot \
            --flavor "${FLAVOR_NAME}" --name "${CLONE_NAME}" 9>&-
          exec 9>&-

          echo "Cluster clone '${CLONE_NAME}' booted."

          # cluster-tool boot runs as root (via sudo), so both ~/.kube and
          # the kubeconfig are owned by root. Copy to RUNNER_TEMP so the
          # runner user owns it — podman needs this to relabel for :Z mounts.
          sudo cp "${HOME}/.kube/${CLONE_NAME}.kubeconfig" "$RUNNER_TEMP/kubeconfig"
          sudo chown "$(id -u):$(id -g)" "$RUNNER_TEMP/kubeconfig"
          chmod 600 "$RUNNER_TEMP/kubeconfig"

      - name: Build test image
        env:
          E2E_IMAGE: "osac-e2e-tests:${{ github.run_id }}"
        run: podman build --no-cache -t "${E2E_IMAGE}" -f Containerfile .

      - name: Build and load component image
        if: inputs.component-repo != ''
        env:
          KUBECONFIG: ${{ runner.temp }}/kubeconfig
          COMPONENT_REPO: ${{ inputs.component-repo }}
          COMPONENT_REF: ${{ inputs.component-ref }}
          COMPONENT_FILE: ${{ inputs.component-containerfile }}
          COMPONENT_IMAGE_KEY: ${{ inputs.component-image-key }}
          COMPONENT_BUILD_TYPE: ${{ inputs.component-build-type }}
        run: |
          COMPONENT_TAG="localhost/component-pr:${GITHUB_RUN_ID}"

          echo "Cloning ${COMPONENT_REPO}@${COMPONENT_REF}..."
          git clone --depth 1 --branch "${COMPONENT_REF}" \
            "https://github.com/${COMPONENT_REPO}.git" "$RUNNER_TEMP/component-src"

          # --- Build component image ---
          SRC="$RUNNER_TEMP/component-src"
          if [[ "${COMPONENT_BUILD_TYPE}" == "ansible-builder" ]]; then
            echo "Generating build context with ansible-builder from ${COMPONENT_FILE}..."
            python3 -m pip install --quiet ansible-builder
            ansible-builder create --file "${SRC}/${COMPONENT_FILE}" --context "${SRC}/context"
            podman build -t "${COMPONENT_TAG}" -f "${SRC}/context/Containerfile" "${SRC}/context"
          else
            echo "Building image from ${COMPONENT_FILE}..."
            podman build -t "${COMPONENT_TAG}" -f "${SRC}/${COMPONENT_FILE}" "${SRC}"
          fi

          # Load image onto the cluster node so CRI-O can use it locally.
          # On RHCOS, root podman and CRI-O share /var/lib/containers/storage,
          # so 'podman load' via oc debug makes the image available to the kubelet.
          NODE_NAME=$(oc get nodes -o jsonpath='{.items[0].metadata.name}')

          echo "Loading image onto node ${NODE_NAME}..."
          podman save "${COMPONENT_TAG}" | \
            oc debug "node/${NODE_NAME}" -t=false -- \
              chroot /host podman load

          # Pass image tag for teardown cleanup
          echo "COMPONENT_IMAGE=${COMPONENT_TAG}" >> "$GITHUB_ENV"

          rm -rf "$RUNNER_TEMP/component-src"

      - name: Prepare cluster prerequisites
        env:
          KUBECONFIG: ${{ runner.temp }}/kubeconfig
        run: |
          # On a freshly booted sno64withdisk cluster (bare OpenShift, no OSAC),
          # three cluster-level prerequisites are needed before setup.sh can
          # succeed. These are normally baked into OSAC snapshot flavors by
          # snapshot_lib.py during snapshot creation.

          # 1. Wait for CatalogSource to be READY (operators depend on it)
          echo "Waiting for CatalogSource redhat-operators to be READY..."
          oc wait --for=jsonpath='{.status.connectionState.lastObservedState}'=READY \
            catalogsource/redhat-operators -n openshift-marketplace --timeout=300s
          echo "CatalogSource is READY."

          # 2. Patch OVN masquerade subnet to avoid networking conflicts
          echo "Patching OVN masquerade subnet to 169.254.0.0/17..."
          oc patch networks.operator.openshift.io cluster --type=merge \
            -p '{"spec":{"defaultNetwork":{"ovnKubernetesConfig":{"gatewayConfig":{"ipv4":{"internalMasqueradeSubnet":"169.254.0.0/17"}}}}}}'
          oc delete pod -n openshift-network-operator -l name=network-operator
          echo "Waiting 180s for OVN to stabilize..."
          sleep 180
          oc rollout status ds/ovnkube-node -n openshift-ovn-kubernetes --timeout=300s
          echo "OVN rollout complete."

          # 3. Apply KubeletConfig to increase maxPods to 500
          echo "Applying KubeletConfig (maxPods: 500)..."
          cat <<'KUBELET_EOF' | oc apply -f -
          apiVersion: machineconfiguration.openshift.io/v1
          kind: KubeletConfig
          metadata:
            name: set-master-max-pods
          spec:
            machineConfigPoolSelector:
              matchLabels:
                pools.operator.machineconfiguration.openshift.io/master: ""
            kubeletConfig:
              maxPods: 500
          KUBELET_EOF
          echo "Waiting for MCP master to finish updating (node will reboot on SNO)..."
          oc wait --for=condition=Updated mcp/master --timeout=600s
          echo "Waiting 180s for MCP to settle..."
          sleep 180
          echo "Cluster prerequisites applied."

      - name: Install infrastructure operators
        env:
          KUBECONFIG: ${{ runner.temp }}/kubeconfig
          INSTALLER_REF: ${{ inputs.installer-ref }}
          INSTALLER_REPO: ${{ inputs.installer-repo }}
        run: |
          # Ensure helm, yq, and jq are available (setup.sh requires helm)
          if ! command -v helm &>/dev/null; then
            curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          fi
          if ! command -v yq &>/dev/null; then
            sudo curl -fsSL -o /usr/local/bin/yq \
              "https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64"
            sudo chmod +x /usr/local/bin/yq
          fi
          if ! command -v jq &>/dev/null; then
            sudo dnf install -y jq || sudo apt-get install -y jq
          fi

          # Clone osac-installer (reused by the next step)
          INSTALLER_DIR="$RUNNER_TEMP/osac-installer"
          git clone --recurse-submodules --depth 1 --branch "${INSTALLER_REF}" \
            "https://github.com/${INSTALLER_REPO}.git" "${INSTALLER_DIR}"
          cd "${INSTALLER_DIR}"

          # Install infrastructure operators only (LVMS, MetalLB, CNV)
          export SETUP_PHASE=prerequisites
          export DEPLOY_MODE=helm
          export VALUES_FILE=values/vmaas-ci/values.yaml
          export INGRESS_SERVICE=true
          export VIRT_SERVICE=true
          export STORAGE_SERVICE=true
          bash scripts/setup.sh

      - name: Install OSAC
        env:
          KUBECONFIG: ${{ runner.temp }}/kubeconfig
          INSTALLER_NAMESPACE: ${{ inputs.namespace }}
          INSTALLER_VM_TEMPLATE: ${{ inputs.vm-template }}
          INSTALLER_CLUSTER_TEMPLATE: ${{ inputs.cluster-template }}
          AAP_LICENSE_FILE: ${{ runner.temp }}/aap-license.zip
          IMAGE_OVERRIDES: ${{ inputs.image-overrides }}
          COMPONENT_IMAGE_KEY: ${{ inputs.component-image-key }}
        run: |
          # Reuse the osac-installer clone from the previous step
          INSTALLER_DIR="$RUNNER_TEMP/osac-installer"
          cd "${INSTALLER_DIR}"

          # Deploy OSAC (skips already-installed infrastructure operators)
          export SETUP_PHASE=deploy
          export DEPLOY_MODE=helm
          export VALUES_FILE=values/vmaas-ci/values.yaml
          export INGRESS_SERVICE=true
          export VIRT_SERVICE=true
          export STORAGE_SERVICE=true
          bash scripts/setup.sh

          # --- Merge component image into overrides ---
          # If a component image was built and loaded onto the node,
          # add it to the overrides so helm deploys it.
          # Charts that split image into .repository + .tag need both set;
          # charts that use a single value (e.g. service.images.service) get the full ref.
          MERGED_OVERRIDES="${IMAGE_OVERRIDES}"
          if [[ -n "${COMPONENT_IMAGE:-}" ]] && [[ -n "${COMPONENT_IMAGE_KEY}" ]]; then
            if [[ "${COMPONENT_IMAGE_KEY}" == *.repository ]]; then
              # Split "localhost/component-pr:RUN_ID" into repo + tag
              # Also set pullPolicy=IfNotPresent so CRI-O uses the locally-loaded image
              IMG_REPO="${COMPONENT_IMAGE%%:*}"
              IMG_TAG="${COMPONENT_IMAGE#*:}"
              TAG_KEY="${COMPONENT_IMAGE_KEY%.repository}.tag"
              PULL_KEY="${COMPONENT_IMAGE_KEY%.repository}.pullPolicy"
              MERGED_OVERRIDES=$(echo "${MERGED_OVERRIDES}" | \
                jq -c --arg rk "${COMPONENT_IMAGE_KEY}" --arg rv "${IMG_REPO}" \
                      --arg tk "${TAG_KEY}" --arg tv "${IMG_TAG}" \
                      --arg pk "${PULL_KEY}" --arg pv "IfNotPresent" \
                      '. + {($rk): $rv, ($tk): $tv, ($pk): $pv}')
              echo "Component image override: ${COMPONENT_IMAGE_KEY}=${IMG_REPO}, ${TAG_KEY}=${IMG_TAG}, ${PULL_KEY}=IfNotPresent"
            else
              MERGED_OVERRIDES=$(echo "${MERGED_OVERRIDES}" | \
                jq -c --arg k "${COMPONENT_IMAGE_KEY}" --arg v "${COMPONENT_IMAGE}" '. + {($k): $v}')
              echo "Component image override: ${COMPONENT_IMAGE_KEY}=${COMPONENT_IMAGE}"
            fi
          fi

          # --- Apply image overrides ---
          # If callers pass image overrides (or a component was built),
          # apply them via helm upgrade --set.
          if [[ -n "${MERGED_OVERRIDES}" ]] && [[ "${MERGED_OVERRIDES}" != "{}" ]]; then
            echo "Applying image overrides..."
            SET_ARGS=()
            for key in $(echo "${MERGED_OVERRIDES}" | jq -r 'keys[]'); do
              value=$(echo "${MERGED_OVERRIDES}" | jq -r --arg k "${key}" '.[$k]')
              SET_ARGS+=("--set-string" "${key}=${value}")
              echo "  --set-string ${key}=${value}"
            done

            yq -i '(.dependencies[].version) = "0.0.0"' charts/osac/Chart.yaml
            helm dependency update charts/osac/
            helm upgrade osac charts/osac/ \
              --namespace "${INSTALLER_NAMESPACE}" \
              --reuse-values \
              "${SET_ARGS[@]}" \
              --timeout 10m \
              --wait
          fi

      - name: Run E2E tests
        id: test
        env:
          TEST_SUITE: ${{ inputs.test-suite }}
          TEST_FILTER: ${{ inputs.test-filter }}
          OSAC_NAMESPACE: ${{ inputs.namespace }}
          OSAC_VM_TEMPLATE: ${{ inputs.vm-template }}
          OSAC_CLUSTER_TEMPLATE: ${{ inputs.cluster-template }}
          E2E_IMAGE: "osac-e2e-tests:${{ github.run_id }}"
        run: |
          KUBECONFIG_PATH="$RUNNER_TEMP/kubeconfig"

          TEST_ARGS="tests/"
          if [ -n "${TEST_SUITE}" ]; then
            TEST_ARGS="tests/${TEST_SUITE}/"
          fi

          FILTER_ARGS=""
          if [ -n "${TEST_FILTER}" ]; then
            FILTER_ARGS="-k ${TEST_FILTER}"
          fi

          mkdir -p "$RUNNER_TEMP/test-output"

          podman run --rm --network=host \
            -v "${KUBECONFIG_PATH}":/root/.kube/config:ro,Z \
            -v "${RUNNER_TEMP}/pull-secret.json":/root/pull-secret:ro,Z \
            -v "${RUNNER_TEMP}/aap-license.zip":/root/aap-license.zip:ro,Z \
            -v "${RUNNER_TEMP}/test-output":/tmp/test-output:Z \
            -e KUBECONFIG=/root/.kube/config \
            -e OSAC_VM_KUBECONFIG=/root/.kube/config \
            -e OSAC_NAMESPACE="${OSAC_NAMESPACE}" \
            -e OSAC_VM_TEMPLATE="${OSAC_VM_TEMPLATE}" \
            -e OSAC_CLUSTER_TEMPLATE="${OSAC_CLUSTER_TEMPLATE}" \
            -e OSAC_PULL_SECRET_PATH=/root/pull-secret \
            "${E2E_IMAGE}" \
            pytest ${TEST_ARGS} ${FILTER_ARGS} \
              --junitxml=/tmp/test-output/junit.xml -v

      - name: Gather artifacts
        if: always()
        uses: ./.github/actions/gather-artifacts
        with:
          namespace: ${{ inputs.namespace }}
          kubeconfig-path: ${{ runner.temp }}/kubeconfig
          artifact-name: osac-logs-full-install-${{ github.run_id }}
          junit-path: ${{ runner.temp }}/test-output/junit.xml

      - name: Teardown
        if: always()
        env:
          CLONE_NAME: ${{ steps.clone-name.outputs.clone-name }}
          E2E_IMAGE: "osac-e2e-tests:${{ github.run_id }}"
          # COMPONENT_IMAGE is set by the build step via GITHUB_ENV;
          # it will be empty if no component was built.
        run: bash .github/scripts/teardown.sh
